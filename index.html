<!DOCTYPE html>
<html lang="en">

<head>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#ff7eb3">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Crystal Clicker">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="icon-192.png">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
  <title>💎 Crystal Clicker: Ultimate Edition</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      
      /* Prevent text selection */
      -webkit-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
      user-select: none;
    }
    
    html, body {
      background: #0F0C29;
      padding-top: env(safe-area-inset-top);
    }
    
    body {
      margin: 0;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      color: white;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 30px;
      overflow-x: hidden;
      
      /* Prevent text selection on body */
      -webkit-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
      user-select: none;
    }

    .game {
      width: 900px;
      background: rgba(25, 25, 45, 0.8);
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 0 30px rgba(106, 27, 154, 0.7), 
                  inset 0 0 20px rgba(0, 0, 0, 0.5);
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(106, 27, 154, 0.5);
      
      /* Prevent text selection on game container */
      -webkit-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
      user-select: none;
    }

    .game::before {
      content: "";
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(106, 27, 154, 0.1) 0%, transparent 70%);
      z-index: -1;
    }

    h1, h2 {
      margin-top: 0;
      text-align: center;
      position: relative;
      display: inline-block;
      margin-bottom: 15px;
    }

    h1 {
      font-size: 3rem;
      background: linear-gradient(to right, #ff7eb3, #ff758c, #ff7eb3);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 15px rgba(255, 126, 179, 0.5);
      letter-spacing: 1px;
    }

    h2 {
      font-size: 1.8rem;
      color: #ff7eb3;
      margin-top: 20px;
      padding-bottom: 10px;
      border-bottom: 2px solid rgba(255, 126, 179, 0.3);
    }

    .top {
      text-align: center;
      margin-bottom: 30px;
      position: relative;
    }

    .score {
      font-size: 36px;
      margin: 15px 0;
      color: #ffd700;
      text-shadow: 0 0 10px rgba(255, 215, 0, 0.7);
      animation: glow 2s infinite alternate;
    }

    @keyframes glow {
      from { text-shadow: 0 0 10px rgba(255, 215, 0, 0.7); }
      to { text-shadow: 0 0 20px rgba(255, 215, 0, 0.9), 0 0 30px rgba(255, 126, 179, 0.8); }
    }

    .score.flash {
      animation: scoreFlash 0.4s;
    }

    .click-item {
      font-size: 100px;
      width: 180px;
      height: 180px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      background: linear-gradient(145deg, #6a1b9a, #3700b3);
      transition: transform .1s, background .3s;
      animation: pulse 2.5s infinite;
      position: relative;
      box-shadow: 0 0 25px rgba(106, 27, 154, 0.8), 
                  inset 0 0 20px rgba(0, 0, 0, 0.3);
      margin: 0 auto;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      
      /* Prevent text selection on click item */
      -webkit-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
      user-select: none;
      
      /* Remove default focus outline */
      outline: none;
    }

    .click-item:hover {
      background: linear-gradient(145deg, #8e24aa, #7b1fa2);
      transform: scale(1.05);
    }

    .click-item:active {
      transform: scale(0.92);
    }

    .click-item.clicked {
      animation: shake 0.3s, pulse 2s infinite;
    }

    /* Fix for no highlighting on diamond */
    .click-item:focus {
      outline: none;
      box-shadow: 0 0 25px rgba(106, 27, 154, 0.8), 
                  inset 0 0 20px rgba(0, 0, 0, 0.3);
    }

    .click-item::before {
      content: "";
      position: absolute;
      top: -10px;
      left: -10px;
      right: -10px;
      bottom: -10px;
      background: radial-gradient(circle, rgba(255, 215, 0, 0.4), transparent 70%);
      z-index: -1;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .click-item:hover::before {
      opacity: 1;
    }

    .stats {
      color: #e0e0ff;
      margin-top: 20px;
      line-height: 1.6;
      background: rgba(40, 40, 70, 0.5);
      padding: 15px;
      border-radius: 12px;
      box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.3);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .stats div {
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid rgba(106, 27, 154, 0.3);
    }

    .stats div:last-child {
      border-bottom: none;
    }

    .stats strong {
      color: #ff7eb3;
      min-width: 150px;
      text-align: left;
    }

    .stats span {
      color: #ffd700;
      font-weight: bold;
      min-width: 100px;
      text-align: right;
    }

    .shop {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
      margin-top: 30px;
    }

    .section {
      background: rgba(40, 40, 70, 0.6);
      border-radius: 15px;
      padding: 20px;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(106, 27, 154, 0.3);
      
      /* Prevent text selection on sections */
      -webkit-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
      user-select: none;
    }

    .upgrade {
      background: rgba(50, 50, 80, 0.7);
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 15px;
      transition: transform 0.2s, box-shadow 0.2s;
      border: 1px solid rgba(106, 27, 154, 0.3);
      position: relative;
      overflow: hidden;
      
      /* Prevent text selection on upgrades */
      -webkit-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
      user-select: none;
    }

    .upgrade:hover {
      transform: translateY(-5px);
      box-shadow: 0 8px 20px rgba(106, 27, 154, 0.4);
      background: rgba(60, 60, 90, 0.8);
    }

    .upgrade:hover::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(45deg, rgba(255, 215, 0, 0.1), transparent);
      pointer-events: none;
    }

    .upgrade strong {
      display: block;
      margin-bottom: 8px;
      color: #ffd700;
      font-size: 1.2rem;
    }

    .upgrade p {
      margin: 6px 0;
      color: #e0e0ff;
      font-size: 14px;
    }

    button {
      border: none;
      border-radius: 8px;
      padding: 10px 15px;
      cursor: pointer;
      font-weight: bold;
      transition: all 0.2s;
      width: 100%;
      margin-top: 10px;
      
      /* Prevent text selection on buttons */
      -webkit-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
      user-select: none;
    }

    .buy {
      background: linear-gradient(145deg, #ff7eb3, #ff758c);
      color: white;
      box-shadow: 0 4px 10px rgba(255, 126, 179, 0.4);
      font-weight: bold;
    }

    .buy:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 15px rgba(255, 126, 179, 0.6);
    }

    .buy:active {
      transform: scale(0.98);
    }

    .buy:disabled {
      background: #555;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .danger {
      background: linear-gradient(145deg, #ff5c5c, #ff0000);
      color: white;
      margin-top: 25px;
      padding: 12px;
      font-size: 1.1rem;
      box-shadow: 0 4px 10px rgba(255, 92, 92, 0.4);
    }

    .danger:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 15px rgba(255, 92, 92, 0.6);
    }

    .floating-text {
      position: fixed;
      color: #ffd700;
      font-weight: bold;
      font-size: 24px;
      pointer-events: none;
      animation: floatUp 1s ease-out forwards;
      text-shadow: 0 0 10px rgba(255, 215, 0, 0.9);
      z-index: 9999;
      text-align: center;
    }

    .notification {
      position: fixed;
      top: 20px;
      right: 20px;
      background: rgba(0, 0, 0, 0.8);
      color: white;
      padding: 15px 25px;
      border-radius: 10px;
      transform: translateX(200%);
      transition: transform 0.3s ease;
      z-index: 1000;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
      border-left: 4px solid #ffd700;
    }

    .notification.show {
      transform: translateX(0);
    }

    @keyframes pulse {
      0% { box-shadow: 0 0 0 rgba(106, 27, 154, 0.6); }
      50% { box-shadow: 0 0 30px rgba(106, 27, 154, 0.9); }
      100% { box-shadow: 0 0 0 rgba(106, 27, 154, 0.6); }
    }

    @keyframes floatUp {
      from { opacity: 1; transform: translateY(0) scale(1); }
      to { opacity: 0; transform: translateY(-60px) scale(0.8); }
    }

    @keyframes shake {
      0% { transform: rotate(0deg); }
      25% { transform: rotate(4deg); }
      50% { transform: rotate(-4deg); }
      75% { transform: rotate(3deg); }
      100% { transform: rotate(0deg); }
    }

    @keyframes scoreFlash {
      0% { transform: scale(1); }
      50% { transform: scale(1.1); }
      100% { transform: scale(1); }
    }

    .particle {
      position: absolute;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      pointer-events: none;
      z-index: 10;
      opacity: 0.7;
    }

    @media (max-width: 900px) {
      .game {
        width: 95%;
        padding: 20px;
      }
      
      h1 {
        font-size: 2.2rem;
      }
      
      .click-item {
        width: 150px;
        height: 150px;
        font-size: 80px;
      }
      
      .shop {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 600px) {
      h1 {
        font-size: 1.8rem;
      }
      
      .click-item {
        width: 130px;
        height: 130px;
        font-size: 70px;
      }
      
      .stats div {
        flex-direction: column;
        align-items: flex-start;
        gap: 5px;
      }
      
      .stats strong {
        min-width: auto;
      }
      
      .stats span {
        min-width: auto;
      }
    }

    /* Crystal decoration */
    .crystal-decor {
      position: absolute;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      pointer-events: none;
      z-index: -1;
      
      /* Prevent text selection on decorations */
      -webkit-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
      user-select: none;
    }

    .crystal {
      position: absolute;
      background: radial-gradient(circle, rgba(255, 215, 0, 0.3), transparent 70%);
      border-radius: 50%;
      animation: floatCrystal 15s infinite linear;
      
      /* Prevent text selection on crystals */
      -webkit-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
      user-select: none;
    }

    @keyframes floatCrystal {
      0% { transform: translate(0, 0) rotate(0deg); }
      25% { transform: translate(10px, 20px) rotate(90deg); }
      50% { transform: translate(20px, 0) rotate(180deg); }
      75% { transform: translate(10px, -20px) rotate(270deg); }
      100% { transform: translate(0, 0) rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="game">
    <div class="crystal-decor" id="crystalDecor"></div>
    
    <div class="top">
      <h1>💎 Crystal Clicker: Ultimate Edition 💎</h1>
      <div class="score">Points: <span id="points">0</span></div>
      <button class="click-item" id="clickItem">💎</button>
      <div class="stats">
        <div><strong>Click Power:</strong> <span id="clickPower">1</span></div>
        <div><strong>Passive Income:</strong> <span id="passiveIncome">0</span>/sec</div>
        <div><strong>Global Multiplier:</strong> <span id="multiplier">1</span></div>
      </div>
    </div>

    <div class="shop">
      <div class="section"><h2><i class="fas fa-hand-pointer"></i> Click Upgrades</h2><div id="clickUpgrades"></div></div>
      <div class="section"><h2><i class="fas fa-robot"></i> Auto Clickers</h2><div id="autoClickers"></div></div>
      <div class="section"><h2><i class="fas fa-bolt"></i> Multipliers</h2><div id="multipliers"></div></div>
      <div class="section"><h2><i class="fas fa-mountain"></i> Mines</h2><div id="mines"></div></div>
    </div>

    <button class="danger" onclick="resetGame()">Reset Game <i class="fas fa-redo"></i></button>
  </div>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/service-worker.js')
          .then((registration) => {
            console.log('SW registered: ', registration);
          })
          .catch((error) => {
            console.log('SW registration failed: ', error);
          });
      });
    }
  </script>
  <script>
    let points = 0;
    let baseClickPower = 1;
    let passiveIncome = 0;
    let globalMultiplier = 1;

    // Store original upgrade costs for reset
    const originalUpgrades = {
      clickUpgrades: [
        { name: "Stronger Finger", effect: 1, cost: 10, scaling: 1.25, owned: 0 },
        { name: "Reinforced Gloves", effect: 5, cost: 100, scaling: 1.3, owned: 0 },
        { name: "Steel Hammer", effect: 25, cost: 750, scaling: 1.35, owned: 0 },
        { name: "Diamond Drill", effect: 100, cost: 5000, scaling: 1.4, owned: 0 },
        { name: "Plasma Cutter", effect: 500, cost: 30000, scaling: 1.45, owned: 0 },
        { name: "Quantum Touch", effect: 2500, cost: 250000, scaling: 1.5, owned: 0 }
      ],
      autoClickers: [
        { name: "Mouse Assistant", cps: 1, cost: 50, scaling: 1.2, owned: 0 },
        { name: "Auto Clicker", cps: 5, cost: 250, scaling: 1.25, owned: 0 },
        { name: "Robot Finger", cps: 15, cost: 1500, scaling: 1.3, owned: 0 },
        { name: "Mining Drone", cps: 50, cost: 10000, scaling: 1.35, owned: 0 },
        { name: "AI Mining Crew", cps: 250, cost: 75000, scaling: 1.4, owned: 0 },
        { name: "Nano Factory", cps: 1000, cost: 500000, scaling: 1.45, owned: 0 }
      ],
      multipliers: [
        { name: "Better Technique", multiplier: 2, cost: 500, owned: false },
        { name: "Power Surge", multiplier: 3, cost: 5000, owned: false },
        { name: "Hyper Efficiency", multiplier: 5, cost: 50000, owned: false },
        { name: "Quantum Amplifier", multiplier: 10, cost: 500000, owned: false },
        { name: "Temporal Loop", multiplier: 25, cost: 5000000, owned: false }
      ],
      mines: [
        { name: "Small Mine", income: 2, cost: 250, scaling: 1.25, owned: 0 },
        { name: "Mine Shaft", income: 10, cost: 1500, scaling: 1.3, owned: 0 },
        { name: "Quarry", income: 40, cost: 10000, scaling: 1.35, owned: 0 },
        { name: "Industrial Mine", income: 200, cost: 75000, scaling: 1.4, owned: 0 },
        { name: "Mega Quarry", income: 4000, cost: 5000000, scaling: 1.5, owned: 0 }
      ]
    };

    const clickUpgrades = originalUpgrades.clickUpgrades;
    const autoClickers = originalUpgrades.autoClickers;
    const multipliers = originalUpgrades.multipliers;
    const mines = originalUpgrades.mines;

    const pointsDisplay = document.getElementById("points");
    const clickPowerDisplay = document.getElementById("clickPower");
    const passiveIncomeDisplay = document.getElementById("passiveIncome");
    const multiplierDisplay = document.getElementById("multiplier");
    const clickButton = document.getElementById("clickItem");
    const scoreBox = document.querySelector(".score");

    // Create background crystals
    function createBackgroundCrystals() {
      const container = document.getElementById('crystalDecor');
      const crystalCount = 15;
      
      for (let i = 0; i < crystalCount; i++) {
        const crystal = document.createElement('div');
        crystal.className = 'crystal';
        
        // Random size
        const size = Math.random() * 60 + 20;
        crystal.style.width = `${size}px`;
        crystal.style.height = `${size}px`;
        
        // Random position
        crystal.style.left = `${Math.random() * 100}%`;
        crystal.style.top = `${Math.random() * 100}%`;
        
        // Random animation duration and delay
        const duration = Math.random() * 20 + 10;
        const delay = Math.random() * 5;
        crystal.style.animationDuration = `${duration}s`;
        crystal.style.animationDelay = `${delay}s`;
        
        container.appendChild(crystal);
      }
    }

    clickButton.addEventListener("click", (event) => {
      const gained = getClickPower();
      points += gained;

      showFloatingText(event.clientX, event.clientY, `+${format(gained)}`);

      // Create particles
      createParticles(event.clientX, event.clientY);

      clickButton.classList.remove("clicked");
      void clickButton.offsetWidth;
      clickButton.classList.add("clicked");

      scoreBox.classList.remove("flash");
      void scoreBox.offsetWidth;
      scoreBox.classList.add("flash");

      updateDisplay();
    });

    function getClickPower() {
      return baseClickPower * globalMultiplier;
    }

    function format(num) {
      if (num >= 1000000000) {
        return (num / 1000000000).toFixed(1) + 'B';
      }
      if (num >= 1000000) {
        return (num / 1000000).toFixed(1) + 'M';
      }
      if (num >= 1000) {
        return (num / 1000).toFixed(1) + 'K';
      }
      return Math.floor(num).toString();
    }

    function buyClickUpgrade(index) {
      const upgrade = clickUpgrades[index];
      if (points >= upgrade.cost) {
        points -= upgrade.cost;
        baseClickPower += upgrade.effect;
        upgrade.owned++;
        upgrade.cost = Math.floor(upgrade.cost * upgrade.scaling);
        showFloatingText(window.innerWidth / 2, 120, `${upgrade.name} bought!`);
        updateDisplay();
      }
    }

    function buyAutoClicker(index) {
      const upgrade = autoClickers[index];
      if (points >= upgrade.cost) {
        points -= upgrade.cost;
        passiveIncome += upgrade.cps;
        upgrade.owned++;
        upgrade.cost = Math.floor(upgrade.cost * upgrade.scaling);
        showFloatingText(window.innerWidth / 2, 120, `${upgrade.name} bought!`);
        updateDisplay();
      }
    }

    function buyMultiplier(index) {
      const upgrade = multipliers[index];
      if (!upgrade.owned && points >= upgrade.cost) {
        points -= upgrade.cost;
        globalMultiplier *= upgrade.multiplier;
        upgrade.owned = true;
        showFloatingText(window.innerWidth / 2, 120, `Multiplier x${upgrade.multiplier}!`);
        updateDisplay();
      }
    }

    function buyMine(index) {
      const upgrade = mines[index];
      if (points >= upgrade.cost) {
        points -= upgrade.cost;
        passiveIncome += upgrade.income;
        upgrade.owned++;
        upgrade.cost = Math.floor(upgrade.cost * upgrade.scaling);
        showFloatingText(window.innerWidth / 2, 120, `${upgrade.name} bought!`);
        updateDisplay();
      }
    }

    function renderShop() {
      renderUpgrades("clickUpgrades", clickUpgrades, "click");
      renderUpgrades("autoClickers", autoClickers, "auto");
      renderUpgrades("multipliers", multipliers, "multi");
      renderUpgrades("mines", mines, "mine");
    }

    function renderUpgrades(containerId, upgrades, type) {
      const container = document.getElementById(containerId);
      container.innerHTML = "";

      upgrades.forEach((upgrade, index) => {
        const div = document.createElement("div");
        div.className = "upgrade";

        let effectText = "";
        if (type === "click") effectText = `+${upgrade.effect} click power`;
        if (type === "auto") effectText = `+${upgrade.cps} points/sec`;
        if (type === "multi") effectText = `x${upgrade.multiplier} global multiplier`;
        if (type === "mine") effectText = `+${upgrade.income} points/sec`;

        const ownedText = type === "multi"
          ? upgrade.owned ? "Owned" : "Not owned"
          : `Owned: ${upgrade.owned}`;

        const disabled = type === "multi"
          ? upgrade.owned || points < upgrade.cost
          : points < upgrade.cost;

        const clickFunction =
          type === "click" ? `buyClickUpgrade(${index})` :
          type === "auto" ? `buyAutoClicker(${index})` :
          type === "multi" ? `buyMultiplier(${index})` :
          `buyMine(${index})`;

        div.innerHTML = `
          <strong>${upgrade.name}</strong>
          <p>${effectText}</p>
          <p>${ownedText}</p>
          <p>Cost: ${format(upgrade.cost)}</p>
          <button class="buy" onclick="${clickFunction}" ${disabled ? "disabled" : ""}>
            Buy
          </button>
        `;

        container.appendChild(div);
      });
    }

    function showFloatingText(x, y, text) {
      const floating = document.createElement("div");
      floating.className = "floating-text";
      floating.textContent = text;
      floating.style.left = `${x}px`;
      floating.style.top = `${y}px`;
      document.body.appendChild(floating);

      setTimeout(() => {
        floating.remove();
      }, 1000);
    }

    function createParticles(x, y) {
      const particleCount = 15;
      
      for (let i = 0; i < particleCount; i++) {
        const particle = document.createElement('div');
        particle.className = 'particle';
        
        // Random color
        const colors = ['#ffd700', '#ff8c00', '#ff4500', '#9400d3'];
        const color = colors[Math.floor(Math.random() * colors.length)];
        particle.style.backgroundColor = color;
        
        // Random size
        const size = Math.random() * 10 + 5;
        particle.style.width = `${size}px`;
        particle.style.height = `${size}px`;
        
        // Position at click location
        particle.style.left = `${x}px`;
        particle.style.top = `${y}px`;
        
        document.body.appendChild(particle);
        
        // Animate particle
        const angle = Math.random() * Math.PI * 2;
        const distance = Math.random() * 100 + 50;
        const duration = Math.random() * 800 + 500;
        
        const animation = particle.animate([
          { 
            transform: `translate(0, 0)`,
            opacity: 1
          },
          { 
            transform: `translate(${Math.cos(angle) * distance}px, ${Math.sin(angle) * distance}px)`,
            opacity: 0
          }
        ], {
          duration: duration,
          easing: 'ease-out'
        });
        
        // Remove element after animation
        animation.onfinish = () => particle.remove();
      }
    }

    function updateDisplay() {
      pointsDisplay.textContent = format(points);
      clickPowerDisplay.textContent = format(getClickPower());
      passiveIncomeDisplay.textContent = format(passiveIncome * globalMultiplier);
      multiplierDisplay.textContent = format(globalMultiplier);
      renderShop();
      saveGame();
    }

    function updateDisplayNoSave() {
      pointsDisplay.textContent = format(points);
      clickPowerDisplay.textContent = format(getClickPower());
      passiveIncomeDisplay.textContent = format(passiveIncome * globalMultiplier);
      multiplierDisplay.textContent = format(globalMultiplier);
      renderShop();
    }

    setInterval(() => {
      points += passiveIncome * globalMultiplier;
      updateDisplayNoSave();
    }, 1000);

    function saveGame() {
      const saveData = {
        points,
        baseClickPower,
        passiveIncome,
        globalMultiplier,
        clickUpgrades,
        autoClickers,
        multipliers,
        mines
      };

      localStorage.setItem("crystalClickerSave", JSON.stringify(saveData));
    }

    function loadGame() {
      const saved = localStorage.getItem("crystalClickerSave");
      if (!saved) return;

      try {
        const data = JSON.parse(saved);
        points = data.points ?? points;
        baseClickPower = data.baseClickPower ?? baseClickPower;
        passiveIncome = data.passiveIncome ?? passiveIncome;
        globalMultiplier = data.globalMultiplier ?? globalMultiplier;

        copySavedData(clickUpgrades, data.clickUpgrades);
        copySavedData(autoClickers, data.autoClickers);
        copySavedData(multipliers, data.multipliers);
        copySavedData(mines, data.mines);
      } catch (error) {
        console.error("Save file could not be loaded:", error);
      }
    }

    function copySavedData(current, saved) {
      if (!saved) return;
      current.forEach((item, index) => {
        if (saved[index]) Object.assign(item, saved[index]);
      });
    }

    // Fixed reset game function with proper upgrade cost reset
    function resetGame() {
      const confirmReset = confirm("Reset all progress? This cannot be undone!");
      if (confirmReset) {
        // Clear localStorage
        localStorage.removeItem("crystalClickerSave");

        // Reset game state variables
        points = 0;
        baseClickPower = 1;
        passiveIncome = 0;
        globalMultiplier = 1;
        
        window.location.reload();
        // Reset all upgrades to their original values
        resetUpgrades();
        
        // Update display
        updateDisplayNoSave();

        
        // Show notification
        showNotification("Game reset successfully!");
        window.scrollTo(0,0);
      }
    }

    function resetUpgrades() {
      // Reset click upgrades
      for (let i = 0; i < clickUpgrades.length; i++) {
        clickUpgrades[i].owned = 0;
        clickUpgrades[i].cost = originalUpgrades.clickUpgrades[i].cost;
      }
      
      // Reset auto clickers
      for (let i = 0; i < autoClickers.length; i++) {
        autoClickers[i].owned = 0;
        autoClickers[i].cost = originalUpgrades.autoClickers[i].cost;
      }
      
      // Reset multipliers
      for (let i = 0; i < multipliers.length; i++) {
        multipliers[i].owned = false;
        multipliers[i].cost = originalUpgrades.multipliers[i].cost;
      }
      
      // Reset mines
      for (let i = 0; i < mines.length; i++) {
        mines[i].owned = 0;
        mines[i].cost = originalUpgrades.mines[i].cost;
      }
    }

    function showNotification(message) {
      const notification = document.createElement('div');
      notification.className = 'notification';
      notification.textContent = message;
      notification.style.position = 'fixed';
      notification.style.top = '20px';
      notification.style.right = '20px';
      notification.style.background = 'rgba(0, 0, 0, 0.8)';
      notification.style.color = 'white';
      notification.style.padding = '15px 25px';
      notification.style.borderRadius = '10px';
      notification.style.transform = 'translateX(200%)';
      notification.style.transition = 'transform 0.3s ease';
      notification.style.zIndex = '1000';
      
      document.body.appendChild(notification);
      
      // Show notification
      setTimeout(() => {
        notification.style.transform = 'translateX(0)';
      }, 10);
      
      // Hide notification after 2 seconds
      setTimeout(() => {
        notification.style.transform = 'translateX(200%)';
        setTimeout(() => {
          document.body.removeChild(notification);
        }, 300);
      }, 2000);
    }

    // Initialize game
    loadGame();
    createBackgroundCrystals();
    updateDisplayNoSave();
  </script>
</body>
</html>
